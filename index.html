<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Analyzer</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; }
    #app-fallback { max-width: 960px; margin: 0 auto; padding: 16px; }
    #timeline { display: grid; grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); gap: 8px; margin-top: 12px; }
    .para-slot { min-height: 36px; border: 1px solid #cbd5e1; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; }
    #message, #article-info { margin-top: 12px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; color: #475569; }
  </style>
</head>
<body>
  <main id="app-fallback">
    <h1>Study Analyzer</h1>
    <p>Denne siden laster UI og preview-panel via JavaScript.</p>

    <div id="timeline" aria-label="Tidslinje"></div>

    <div id="message" aria-live="polite">Ingen artikkel analysert ennå.</div>

    <section id="article-info" aria-label="Artikkelinfo">Ingen artikkel analysert ennå.</section>
  </main>

  <script src="./index.js"></script>
</body>
</html>
